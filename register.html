<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
        <link rel="stylesheet" href="File.css/responsive.css">

    <link rel="stylesheet" href="File.css/register and login.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="register-card">
    <div class="logo-area">
        <img src="momen.ggg/M1.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/100'">
    </div>

    <h2>إنشاء حساب جديد</h2>
    <p class="subtitle">انضم إلينا واستمتع بتجربة تسوق فريدة</p>

    <div class="form-group">
        <input id="username" type="text" placeholder="اسم المستخدم" required>
    </div>

    <div class="form-group">
        <input id="password" type="password" placeholder="كلمة المرور" required>
    </div>

    <button class="btn-register" onclick="register()">تسجيل الحساب</button>

    <div class="terms-area">
        <p>بتسجيلك أنت توافق على <br> 
            <a href="#">شروط الاستخدام</a> و <a href="#">سياسة الخصوصية</a>
        </p>
    </div>

    <div class="footer-link">
        لديك حساب بالفعل؟ <a href="login.html">سجل دخولك هنا</a>
    </div>
</div>

<script>
    function register() {
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;

        if(user === "" || pass === "") {
            alert("من فضلك ادخل البيانات كاملة");
            return;
        }

        localStorage.setItem("user", user);
        localStorage.setItem("pass", pass);

        alert("تم إنشاء الحساب بنجاح! 🎉");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
