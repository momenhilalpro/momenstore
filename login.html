<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل </title>
    <link rel="stylesheet" href="File.css/register and login.css"> <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
       
</head>
<body>

<div class="register-card">
    <div class="logo-area">
        <img src="momen.ggg/M1.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/100'">
    </div>

    <h2>تسجيل الدخول</h2>
    <p class="subtitle">سعداء برؤيتك مرة أخرى!</p>

    <div class="form-group">
        <input id="login-user" type="text" placeholder="اسم المستخدم" required>
    </div>

    <div class="form-group">
        <input id="login-pass" type="password" placeholder="كلمة المرور" required>
    </div>

    <div style="text-align: right; margin-bottom: 20px;">
        <a href="#" style="font-size: 0.8rem; color: #764ba2; text-decoration: none;">نسيت كلمة المرور؟</a>
    </div>

    <button class="btn-register" onclick="login()">دخول</button>

    <div class="footer-link">
        ليس لديك حساب؟ <a href="register.html">أنشئ حسابك الآن</a>
    </div>
</div>

<script >
    function login() {
    // 1. جلب البيانات من المدخلات
    let userField = document.getElementById("login-user").value;
    let passField = document.getElementById("login-pass").value;

    // 2. جلب البيانات المسجلة مسبقاً من المتصفح
    let registeredUser = localStorage.getItem("user");
    let registeredPass = localStorage.getItem("pass");

    // 3. التحقق من صحة البيانات
    if (userField === "" || passField === "") {
        alert("برجاء إدخال اسم المستخدم وكلمة المرور");
        return;
    }

    if (userField === registeredUser && passField === registeredPass) {
        alert("تم تسجيل الدخول بنجاح! مرحباً بك 🎊");
        
        // حفظ حالة الدخول (عشان الموقع يفتكر إنه سجل دخول)
        localStorage.setItem("isLoggedIn", "true");

        // التوجيه لصفحة المنتجات أو الرئيسية
        window.location.href = "indecx (2).html"; 
    } else {
        alert("اسم المستخدم أو كلمة المرور غير صحيحة ❌");
    }
}
</script>
</body>
</html>
